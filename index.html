<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>HUYCODER — Get Key & Verify Key</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-deep: #050708;
    --card-dark: #0f1117;
    --panel-gray: #171c24;
    --text-main: #f5f9ff;
    --text-secondary: #cbd5e6;
    --text-muted: #8e9aaf;
    --key-bg: #0a0d12;
    --error-red: #ff8a7a;
  }

  body {
    background: radial-gradient(circle at 30% 20%, #0e121b, #030507);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    line-height: 1.5;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.8rem;
  }

  .card {
    max-width: 860px;
    width: 100%;
    background: #0f1117;
    border-radius: 2rem;
    padding: 2rem;
    display: flex;
    gap: 2rem;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  .card:hover {
    border-color: rgba(255, 255, 255, 0.9);
    transform: scale(1.01);
  }

  .logo {
    width: 130px;
    height: 130px;
    flex-shrink: 0;
    background: #171c24;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.5);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  .logo:hover {
    transform: scale(1.02);
    border-color: white;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .body {
    flex: 1;
  }

  .title {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #ffffff;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #cbd5e6;
    margin-bottom: 1.6rem;
    border-left: 3px solid white;
    padding-left: 0.9rem;
  }

  .key-box {
    background: #0a0d12;
    border-radius: 1.5rem;
    padding: 1.2rem 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.2rem;
    flex-wrap: wrap;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  .key-box:hover {
    border-color: rgba(255, 255, 255, 0.9);
    transform: translateY(-1px);
  }

  .key-text {
    flex: 1;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 1.15rem;
    font-weight: 700;
    color: #ffffff;
    word-break: break-word;
    white-space: normal;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: all 0.2s ease;
    padding: 0.2rem 0;
    border-radius: 12px;
    outline: none !important;
    -webkit-tap-highlight-color: transparent;
  }

  .key-text:active {
    transform: scale(0.97);
    background: rgba(255, 255, 255, 0.05);
    text-shadow: none;
    transition: transform 0.08s linear, background 0.1s ease;
  }

  .key-text:hover {
    background: transparent;
    text-shadow: none;
  }

  .error-key {
    color: #ff8a7a !important;
  }

  .small {
    font-size: 0.72rem;
    font-weight: 500;
    color: #8e9aaf;
    margin-top: 1.5rem;
    text-align: left;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    padding-top: 1rem;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.5s;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .modal-text-group {
    transition: all 0.3s ease-out;
  }

  .modal-container {
    background: transparent;
    border-radius: 2rem;
    padding: 1.5rem 1.75rem;
    max-width: 420px;
    width: 90%;
    text-align: center;
    border: none;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    box-shadow: none;
  }

  .modal-overlay.active .modal-container {
    transform: scale(1) translateY(0);
  }


  .modal-title {
    font-size: 1.9rem;
    font-weight: 800;
    margin-bottom: 0.75rem;
    color: #ffffff;
    letter-spacing: -0.5px;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .modal-message {
    font-size: 1rem;
    font-weight: 700;
    color: #eef3ff;
    margin: 1rem 0 1.8rem;
    line-height: 1.5;
    white-space: pre-line;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .text-fade-out {
    opacity: 0;
    transform: translateY(8px);
  }
  
  .text-fade-in {
    opacity: 1;
    transform: translateY(0);
  }

  .modal-btn {
    background: #252a33;
    border: 1px solid rgba(255, 255, 255, 0.6);
    padding: 0.8rem 2rem;
    border-radius: 60px;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 0.2rem;
  }

  .modal-btn:hover {
    background: #3a4252;
    border-color: white;
    transform: translateY(-2px);
  }

  .modal-btn:active {
    transform: translateY(1px);
  }

  .circle-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.8rem;
  }
  .error-circle {
    border: 3px solid #e74c3c;
    background: rgba(231, 76, 60, 0.15);
  }
  .error-x {
    font-size: 2.6rem;
    font-weight: 500;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #e74c3c;
    line-height: 1;
  }
  .success-circle {
    border: 3px solid #2ecc71;
    background: rgba(46, 204, 113, 0.15);
  }
  .success-check {
    font-size: 2.8rem;
    font-weight: 600;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #2ecc71;
    line-height: 1;
  }

  /* Hiệu ứng xoay đều, mượt cho icon kết quả (vẫn có scale nhẹ khi xuất hiện) */
  .rotate-animation {
    animation: rotateScaleSmooth 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
  }
  @keyframes rotateScaleSmooth {
    0% {
      transform: rotate(0deg) scale(0.7);
      opacity: 0.3;
    }
    50% {
      transform: rotate(180deg) scale(1.05);
    }
    100% {
      transform: rotate(360deg) scale(1);
      opacity: 1;
    }
  }

  /* SPINNER QUAY ĐỀU, MƯỢT MÀ - KHÔNG GIẬT */
  .spinner {
    display: inline-block;
    width: 70px;
    height: 70px;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-top: 4px solid #ffffff;
    border-radius: 50%;
    animation: spinUniform 0.8s linear infinite;
    margin-bottom: 0.5rem;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  @keyframes spinUniform {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .modal-fade-out-down {
    animation: fadeOutDown 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
  }
  @keyframes fadeOutDown {
    0% {
      opacity: 1;
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      transform: translateY(40px);
      visibility: hidden;
    }
  }

  .verify-icon {
    position: relative;
    min-height: 100px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  
  .icon-wrapper {
    transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.6, 1.1), transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
  }
  .icon-wrapper.fade-out {
    opacity: 0;
    transform: scale(0.6) rotate(-10deg);
  }
  .icon-wrapper.fade-in {
    animation: floatFadeIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
  }
  @keyframes floatFadeIn {
    0% {
      opacity: 0;
      transform: scale(0.6) translateY(20px);
    }
    50% {
      transform: scale(1.05) translateY(-3px);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  #copyResultModal .modal-container {
    transform: scale(0.96) translateY(10px);
    transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.4, 1.1);
  }
  #copyResultModal.active .modal-container {
    transform: scale(1) translateY(0);
  }

  @media (max-width: 680px) {
    .card {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1.6rem;
      gap: 1.4rem;
    }
    .logo {
      width: 100px;
      height: 100px;
    }
    .body {
      width: 100%;
    }
    .subtitle {
      text-align: left;
    }
    .key-box {
      flex-direction: column;
      align-items: stretch;
      gap: 1rem;
    }
    .key-text {
      font-size: 1rem;
      text-align: center;
    }
    .title {
      font-size: 1.7rem;
      text-align: center;
    }
    .small {
      text-align: center;
    }
    .modal-container {
      padding: 1.5rem;
      width: 85%;
    }
    .modal-title {
      font-size: 1.6rem;
    }
    .circle-icon {
      width: 70px;
      height: 70px;
    }
    .error-x {
      font-size: 2.2rem;
    }
    .success-check {
      font-size: 2.4rem;
    }
    .verify-icon {
      min-height: 90px;
    }

    /* music modal responsive rules removed */
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo" id="logoContainer">
      <img src="z7848321473492_c1e7847b4b48560ad89bbc931c3f7874.jpg"
           alt="HuyCoder"
           onerror="this.style.display='none'; this.parentNode.innerText='HC'; this.parentNode.style.fontSize='3rem'; this.parentNode.style.fontWeight='800'; this.parentNode.style.color='#ffffff'; this.parentNode.style.background='#171c24'; this.parentNode.style.border='1px solid rgba(255,255,255,0.6)';">
    </div>
    <div class="body">
      <h2 class="title">HUYCODER VERIFY</h2>
      <p class="subtitle">HỆ THỐNG XÁC THỰC &amp; LẤY KEY TỰ ĐỘNG</p>

      <div class="key-box">
        <div class="key-text" id="keyText">Đang kiểm tra liên kết...</div>
      </div>

      <div class="small">HUYCODER X TOOL CHÍNH HÃNG © 2026 — HỆ THỐNG BẢO MẬT</div>
    </div>
  </div>
</div>

<div id="verifyModal" class="modal-overlay">
  <div class="modal-container" id="verifyModalContainer">
    <div id="verifyIconArea" class="verify-icon"></div>
    <div class="modal-text-group" id="modalTextGroup">
      <div class="modal-title" id="verifyTitle">ĐANG XÁC THỰC</div>
      <div class="modal-message" id="verifyMessage">Đang kiểm tra key ...</div>
    </div>
  </div>
</div>

<div id="copyResultModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-title" id="copyResultTitle"></div>
    <div class="modal-message" id="copyResultMsg"></div>
    <button id="closeCopyModalBtn" class="modal-btn">Đóng</button>
  </div>
</div>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  let keyParam = urlParams.get('key');
  // persist key in localStorage so reload keeps it
  try {
    if (keyParam && keyParam.trim() !== '') {
      keyParam = keyParam.trim();
      localStorage.setItem('huco_key', keyParam);
      // remove key parameter from visible URL
      try {
        const cleanPath = window.location.pathname + window.location.hash;
        window.history.replaceState(null, '', cleanPath);
      } catch (e) {}
    } else {
      const stored = localStorage.getItem('huco_key');
      if (stored && stored.trim() !== '') keyParam = stored.trim();
    }
  } catch (e) {
    // ignore storage errors
  }

  const isValidKey = (keyParam && keyParam.trim() !== "");
  
  const keyDisplay = document.getElementById('keyText');
  if (isValidKey) {
    keyDisplay.innerText = keyParam;
    keyDisplay.style.color = "var(--text-main)";
    keyDisplay.classList.remove('error-key');
  } else {
    keyDisplay.innerText = "❌ Lỗi: Không tìm thấy Key trên Link!";
    keyDisplay.style.color = "var(--error-red)";
    keyDisplay.classList.add('error-key');
  }

  const verifyModal = document.getElementById('verifyModal');
  const verifyModalContainer = document.getElementById('verifyModalContainer');
  const verifyIconArea = document.getElementById('verifyIconArea');
  const verifyTitle = document.getElementById('verifyTitle');
  const verifyMessage = document.getElementById('verifyMessage');
  const modalTextGroup = document.getElementById('modalTextGroup');

  const copyResultModal = document.getElementById('copyResultModal');
  const copyResultTitle = document.getElementById('copyResultTitle');
  const copyResultMsg = document.getElementById('copyResultMsg');
  const closeCopyModalBtn = document.getElementById('closeCopyModalBtn');
  let audio = null;
  let isPlaying = false;
  let verifyTimeoutId = null;
  let isTransitioning = false;

  function smoothTextUpdate(titleText, messageText, isError = false) {
    modalTextGroup.classList.add('text-fade-out');
    setTimeout(() => {
      verifyTitle.innerText = titleText;
      verifyMessage.innerText = messageText;
      if (isError) {
        verifyTitle.style.color = "#ffb5a7";
        verifyMessage.style.color = "#ffccbc";
      } else {
        verifyTitle.style.color = "#ffffff";
        verifyMessage.style.color = "#eef3ff";
      }
      modalTextGroup.classList.remove('text-fade-out');
      modalTextGroup.classList.add('text-fade-in');
      setTimeout(() => {
        modalTextGroup.classList.remove('text-fade-in');
      }, 300);
    }, 200);
  }

  function setIconWithSmooth(htmlContent) {
    const currentWrapper = verifyIconArea.querySelector('.icon-wrapper');
    if (currentWrapper) {
      currentWrapper.classList.add('fade-out');
      setTimeout(() => {
        if (verifyIconArea) {
          verifyIconArea.innerHTML = '';
          const newWrapper = document.createElement('div');
          newWrapper.className = 'icon-wrapper fade-in';
          newWrapper.innerHTML = htmlContent;
          verifyIconArea.appendChild(newWrapper);
        }
      }, 280);
    } else {
      verifyIconArea.innerHTML = '';
      const newWrapper = document.createElement('div');
      newWrapper.className = 'icon-wrapper fade-in';
      newWrapper.innerHTML = htmlContent;
      verifyIconArea.appendChild(newWrapper);
    }
  }

  async function transitionToResult(success) {
    if (isTransitioning) return;
    isTransitioning = true;
    if (success) {
      const successHtml = `
        <div class="circle-icon success-circle rotate-animation">
          <div class="success-check">✔</div>
        </div>
      `;
      setIconWithSmooth(successHtml);
      smoothTextUpdate('XÁC THỰC THÀNH CÔNG', 'Đã Xác Thực Key', false);
      
      await new Promise(resolve => setTimeout(resolve, 3000));
      verifyModalContainer.classList.add('modal-fade-out-down');
      const onFadeOutEnd = () => {
        verifyModalContainer.removeEventListener('animationend', onFadeOutEnd);
        verifyModal.classList.remove('active');
        // keep modal-fade-out-down so the container stays hidden until next show
        startAudioAutoplay();
        isTransitioning = false;
      };
      verifyModalContainer.addEventListener('animationend', onFadeOutEnd, { once: true });
    } else {
      const errorHtml = `
        <div class="circle-icon error-circle rotate-animation">
          <div class="error-x">✕</div>
        </div>
      `;
      setIconWithSmooth(errorHtml);
      smoothTextUpdate('XÁC THỰC THẤT BẠI', 'Không Tìm Thấy Key', true);
      isTransitioning = false;
    }
  }

  function startVerification() {
    verifyModal.classList.add('active');
    const spinnerWrapper = document.createElement('div');
    spinnerWrapper.className = 'icon-wrapper';
    spinnerWrapper.innerHTML = '<div class="spinner"></div>';
    verifyIconArea.innerHTML = '';
    verifyIconArea.appendChild(spinnerWrapper);
    
    modalTextGroup.classList.remove('text-fade-out', 'text-fade-in');
    verifyTitle.innerText = 'ĐANG XÁC THỰC KEY';
    verifyMessage.innerText = 'Đang kiểm tra key ...';
    verifyTitle.style.color = "#ffffff";
    verifyMessage.style.color = "#eef3ff";
    verifyModalContainer.classList.remove('modal-fade-out-down');
    
    if (verifyTimeoutId) clearTimeout(verifyTimeoutId);
    
    verifyTimeoutId = setTimeout(() => {
      if (isValidKey) {
        transitionToResult(true);
      } else {
        transitionToResult(false);
      }
      verifyTimeoutId = null;
    }, 3500);
  }

  function initAudio() {
    if (!audio) {
      audio = new Audio('Lanterns.mp3');
      audio.loop = true;
      audio.preload = 'auto';
      audio.onended = function() {
        isPlaying = false;
      };
      audio.onerror = function() {
        // silently ignore audio load errors
      };
    }
  }

  function startAudioAutoplay() {
    try {
      initAudio();
      if (audio) {
        audio.play().then(() => {
          isPlaying = true;
        }).catch(() => {
          // autoplay may be blocked; no UI button is shown
        });
      }
    } catch (e) {
      // ignore
    }
  }

  function showCopyModal(success, message) {
    copyResultModal.classList.remove('active');
    void copyResultModal.offsetWidth;
    if (success) {
      copyResultTitle.innerText = '✅ Thành công';
      copyResultTitle.style.color = "#ffffff";
      copyResultMsg.innerText = message;
    } else {
      copyResultTitle.innerText = '❌ Thất bại';
      copyResultTitle.style.color = "#ffb5a7";
      copyResultMsg.innerText = message;
    }
    copyResultModal.classList.add('active');
    // auto-hide after short delay
    setTimeout(() => {
      if (copyResultModal.classList.contains('active')) {
        copyResultModal.classList.remove('active');
      }
    }, 2200);
  }

  function closeCopyModal() {
    copyResultModal.classList.remove('active');
  }

  closeCopyModalBtn.addEventListener('click', closeCopyModal);
  copyResultModal.addEventListener('click', function(e) {
    if (e.target === copyResultModal) closeCopyModal();
  });

  async function copyKeyFromElement(event) {
    if (!isValidKey) {
      showCopyModal(false, 'Không tìm thấy key hợp lệ trong URL.');
      return;
    }
    const realKey = keyParam.trim();
    keyDisplay.style.transform = 'scale(0.97)';
    keyDisplay.style.background = 'rgba(255, 255, 255, 0.2)';
    setTimeout(() => {
      keyDisplay.style.transform = '';
      keyDisplay.style.background = '';
    }, 150);
    
    try {
      await navigator.clipboard.writeText(realKey);
      showCopyModal(true, `Đã sao chép key thành công:\n${realKey}`);
    } catch (err) {
      showCopyModal(false, 'Lỗi sao chép: Trình duyệt không cho phép hoặc có lỗi kỹ thuật.');
    }
  }

  if (keyDisplay) {
    keyDisplay.addEventListener('mousedown', (e) => {
      e.preventDefault();
      keyDisplay.style.outline = 'none';
    });
    keyDisplay.addEventListener('click', copyKeyFromElement);
  }

  startVerification();
})();
</script>
</body>
</html>
