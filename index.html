<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>HuyCoder — Get Key | White LED</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-deep: #050708;
    --card-dark: #0f1117;
    --panel-gray: #171c24;
    --text-main: #f5f9ff;
    --text-secondary: #cbd5e6;
    --text-muted: #8e9aaf;
    --key-bg: #0a0d12;
    --error-red: #ff8a7a;
    --copy-btn: #252a33;
    --copy-btn-hover: #353d48;
    --transition-default: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  body {
    background: radial-gradient(circle at 30% 20%, #0e121b, #030507);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
    color: var(--text-main);
    min-height: 100vh;
    line-height: 1.5;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.8rem;
  }

  .card {
    max-width: 860px;
    width: 100%;
    background: var(--card-dark);
    border-radius: 2rem;
    padding: 2rem;
    display: flex;
    gap: 2rem;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    transition: var(--transition-default);
  }

  .card:hover {
    border-color: rgba(255, 255, 255, 0.9);
    transform: scale(1.01);
  }

  .logo {
    width: 130px;
    height: 130px;
    flex-shrink: 0;
    background: var(--panel-gray);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.5);
    transition: var(--transition-default);
  }

  .logo:hover {
    transform: scale(1.02);
    border-color: white;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .body {
    flex: 1;
  }

  .title {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #ffffff;
    margin-bottom: 0.3rem;
  }

  .subtitle {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: 1.6rem;
    border-left: 3px solid white;
    padding-left: 0.9rem;
  }

  .key-box {
    background: var(--key-bg);
    border-radius: 1.5rem;
    padding: 1.2rem 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.2rem;
    flex-wrap: wrap;
    transition: var(--transition-default);
  }

  .key-box:hover {
    border-color: rgba(255, 255, 255, 0.9);
    transform: translateY(-1px);
  }

  .key-text {
    flex: 1;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 1.15rem;
    font-weight: 700;
    color: #ffffff;
    word-break: break-word;
    white-space: normal;
    letter-spacing: 0.3px;
  }

  .btn {
    background: var(--copy-btn);
    border: 1px solid rgba(255, 255, 255, 0.5);
    padding: 0.7rem 1.5rem;
    border-radius: 40px;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    color: white;
    cursor: pointer;
    white-space: nowrap;
    transition: var(--transition-default);
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    background: var(--copy-btn-hover);
    border-color: white;
    transform: translateY(-2px);
  }

  .btn:active {
    transform: translateY(1px);
  }

  .error-key {
    color: var(--error-red) !important;
  }

  .small {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 1.5rem;
    text-align: left;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    padding-top: 1rem;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.35s, visibility 0.35s;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .modal-container {
    background: #11161f;
    border-radius: 2rem;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.6);
    transform: scale(0.92) translateY(10px);
    transition: transform 0.35s;
  }

  .modal-overlay.active .modal-container {
    transform: scale(1) translateY(0);
  }

  .modal-title {
    font-size: 1.9rem;
    font-weight: 800;
    margin-bottom: 0.75rem;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .modal-message {
    font-size: 1rem;
    font-weight: 700;
    color: #eef3ff;
    margin: 1rem 0 1.8rem;
    line-height: 1.5;
    white-space: pre-line;
  }

  .modal-btn {
    background: #252a33;
    border: 1px solid rgba(255, 255, 255, 0.6);
    padding: 0.8rem 2rem;
    border-radius: 60px;
    font-weight: 700;
    font-size: 1rem;
    color: white;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 0.2rem;
  }

  .modal-btn:hover {
    background: #3a4252;
    border-color: white;
    transform: translateY(-2px);
  }

  .modal-btn:active {
    transform: translateY(1px);
  }

  .circle-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.8rem;
  }
  .error-circle {
    border: 3px solid #e74c3c;
    background: rgba(231, 76, 60, 0.15);
  }
  .error-x {
    font-size: 2.6rem;
    font-weight: 500;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #e74c3c;
    line-height: 1;
  }
  .success-circle {
    border: 3px solid #2ecc71;
    background: rgba(46, 204, 113, 0.15);
  }
  .success-check {
    font-size: 2.8rem;
    font-weight: 600;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #2ecc71;
    line-height: 1;
  }
  .rotate-animation {
    animation: spinRotate 0.5s ease 1;
  }
  @keyframes spinRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 70px;
    height: 70px;
    border: 4px solid rgba(255, 255, 255, 0.2);
    border-top: 4px solid #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.5rem;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .modal-fade-out-down {
    animation: fadeOutDown 0.5s ease forwards !important;
  }
  @keyframes fadeOutDown {
    0% {
      opacity: 1;
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      transform: translateY(30px);
      visibility: hidden;
    }
  }

  @media (max-width: 680px) {
    .card {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 1.6rem;
      gap: 1.4rem;
    }
    .logo {
      width: 100px;
      height: 100px;
    }
    .body {
      width: 100%;
    }
    .subtitle {
      text-align: left;
    }
    .key-box {
      flex-direction: column;
      align-items: stretch;
      gap: 1rem;
    }
    .key-text {
      font-size: 1rem;
      text-align: center;
    }
    .btn {
      width: 100%;
      justify-content: center;
    }
    .title {
      font-size: 1.7rem;
      text-align: center;
    }
    .small {
      text-align: center;
    }
    .modal-container {
      padding: 1.5rem;
      width: 85%;
    }
    .modal-title {
      font-size: 1.6rem;
    }
    .circle-icon {
      width: 70px;
      height: 70px;
    }
    .error-x {
      font-size: 2.2rem;
    }
    .success-check {
      font-size: 2.4rem;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo" id="logoContainer">
      <img src="z7848321473492_c1e7847b4b48560ad89bbc931c3f7874.jpg"
           alt="HuyCoder"
           onerror="this.style.display='none'; this.parentNode.innerText='HC'; this.parentNode.style.fontSize='3rem'; this.parentNode.style.fontWeight='800'; this.parentNode.style.color='#ffffff'; this.parentNode.style.background='#171c24'; this.parentNode.style.border='1px solid rgba(255,255,255,0.6)';">
    </div>
    <div class="body">
      <h2 class="title">HUYCODER VERIFY</h2>
      <p class="subtitle">HỆ THỐNG XÁC THỰC &amp; LẤY KEY TỰ ĐỘNG</p>

      <div class="key-box">
        <div class="key-text" id="keyText">Đang kiểm tra liên kết...</div>
        <button class="btn" id="copyBtn">COPY KEY</button>
      </div>

      <div class="small">HUYCODER CHÍNH HÃNG © 2026 — HỆ THỐNG BẢO MẬT</div>
    </div>
  </div>
</div>

<div id="verifyModal" class="modal-overlay">
  <div class="modal-container" id="verifyModalContainer">
    <div id="verifyIconArea" class="verify-icon"></div>
    <div class="modal-title" id="verifyTitle">ĐANG XÁC THỰC</div>
    <div class="modal-message" id="verifyMessage">Đang kiểm tra key ...</div>
    <button id="verifyCloseBtn" class="modal-btn" style="display: none;">Đóng</button>
  </div>
</div>

<div id="musicModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-title">🎵 CLICK ĐỂ PHÁT NHẠC</div>
    <div class="modal-message">Nhấn nút bên dưới để thưởng thức nhạc nền</div>
    <button id="playMusicModalBtn" class="modal-btn">▶ Phát nhạc</button>
  </div>
</div>

<div id="copyResultModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-title" id="copyResultTitle"></div>
    <div class="modal-message" id="copyResultMsg"></div>
    <button id="closeCopyModalBtn" class="modal-btn">Đóng</button>
  </div>
</div>

<script>
(function() {
  const urlParams = new URLSearchParams(window.location.search);
  const keyParam = urlParams.get('key');
  const isValidKey = (keyParam && keyParam.trim() !== "");
  
  const keyDisplay = document.getElementById('keyText');
  if (isValidKey) {
    keyDisplay.innerText = keyParam;
    keyDisplay.style.color = "var(--text-main)";
    keyDisplay.classList.remove('error-key');
  } else {
    keyDisplay.innerText = "❌ Lỗi: Không tìm thấy Key trên Link!";
    keyDisplay.style.color = "var(--error-red)";
    keyDisplay.classList.add('error-key');
  }

  const verifyModal = document.getElementById('verifyModal');
  const verifyModalContainer = document.getElementById('verifyModalContainer');
  const verifyIconArea = document.getElementById('verifyIconArea');
  const verifyTitle = document.getElementById('verifyTitle');
  const verifyMessage = document.getElementById('verifyMessage');
  const verifyCloseBtn = document.getElementById('verifyCloseBtn');

  const musicModal = document.getElementById('musicModal');
  const playMusicModalBtn = document.getElementById('playMusicModalBtn');
  const copyResultModal = document.getElementById('copyResultModal');
  const copyResultTitle = document.getElementById('copyResultTitle');
  const copyResultMsg = document.getElementById('copyResultMsg');
  const closeCopyModalBtn = document.getElementById('closeCopyModalBtn');
  const copyButton = document.getElementById('copyBtn');

  let audio = null;
  let isPlaying = false;

  function startVerification() {
    verifyModal.classList.add('active');
    verifyIconArea.innerHTML = '<div class="spinner"></div>';
    verifyTitle.innerText = 'ĐANG XÁC THỰC KEY';
    verifyMessage.innerText = 'Đang kiểm tra key ...';
    verifyCloseBtn.style.display = 'none';
    verifyModalContainer.classList.remove('modal-fade-out-down');
    
    setTimeout(() => {
      if (isValidKey) {
        verifyIconArea.innerHTML = `
          <div class="circle-icon success-circle rotate-animation">
            <div class="success-check">✔</div>
          </div>
        `;
        verifyTitle.innerText = 'XÁC THỰC THÀNH CÔNG';
        verifyMessage.innerText = 'Đã Xác Thực Key';
        verifyCloseBtn.style.display = 'none';
        
        setTimeout(() => {
          verifyModalContainer.classList.add('modal-fade-out-down');
          
          const onFadeOutEnd = () => {
            verifyModalContainer.removeEventListener('animationend', onFadeOutEnd);
            verifyModal.classList.remove('active');
            verifyModalContainer.classList.remove('modal-fade-out-down');
            setTimeout(() => {
              showMusicModal();
            }, 20);
          };
          verifyModalContainer.addEventListener('animationend', onFadeOutEnd, { once: true });
        }, 3000);
      } else {
        verifyIconArea.innerHTML = `
          <div class="circle-icon error-circle rotate-animation">
            <div class="error-x">X</div>
          </div>
        `;
        verifyTitle.innerText = 'XÁC THỰC THẤT BẠI';
        verifyMessage.innerText = 'Không Tìm Thấy Key';
        verifyCloseBtn.style.display = 'none';
      }
    }, 300);
  }

  function showMusicModal() {
    musicModal.classList.add('active');
  }

  verifyModal.addEventListener('click', (e) => {
    if (e.target === verifyModal) {
      if (verifyCloseBtn.style.display === 'inline-block') {
        verifyModal.classList.remove('active');
      }
    }
  });

  function initAudio() {
    if (!audio) {
      audio = new Audio('Lanterns.mp3');
      audio.loop = false;
      audio.onended = function() {
        isPlaying = false;
      };
      audio.onerror = function() {
        const msgDiv = musicModal.querySelector('.modal-message');
        if (msgDiv) msgDiv.innerHTML = '⚠️ Không tìm thấy file Lanterns.mp3.\nVẫn có thể tiếp tục.';
      };
    }
  }

  function playMusic() {
    if (!audio) initAudio();
    if (audio && !isPlaying) {
      audio.play().then(() => {
        isPlaying = true;
      }).catch(err => {
        alert('Không thể phát nhạc. Kiểm tra file Lanterns.mp3 hoặc tương tác trình duyệt.');
      });
    }
  }

  playMusicModalBtn.addEventListener('click', function() {
    playMusic();
    musicModal.classList.remove('active');
  });

  function showCopyModal(success, message) {
    copyResultModal.classList.remove('active');
    void copyResultModal.offsetWidth;
    if (success) {
      copyResultTitle.innerText = '✅ Thành công';
      copyResultTitle.style.color = "#ffffff";
      copyResultMsg.innerText = message;
    } else {
      copyResultTitle.innerText = '❌ Thất bại';
      copyResultTitle.style.color = "#ffb5a7";
      copyResultMsg.innerText = message;
    }
    copyResultModal.classList.add('active');
  }

  function closeCopyModal() {
    copyResultModal.classList.remove('active');
  }

  closeCopyModalBtn.addEventListener('click', closeCopyModal);
  copyResultModal.addEventListener('click', function(e) {
    if (e.target === copyResultModal) closeCopyModal();
  });

  async function copyKeyAction() {
    if (!isValidKey) {
      showCopyModal(false, 'Không tìm thấy key hợp lệ trong URL.');
      return;
    }
    const realKey = keyParam.trim();
    try {
      await navigator.clipboard.writeText(realKey);
      showCopyModal(true, `Đã sao chép key thành công:\n${realKey}`);
      const originalText = copyButton.innerText;
      copyButton.innerText = "✓ COPIED";
      copyButton.style.opacity = "0.9";
      setTimeout(() => {
        copyButton.innerText = originalText;
        copyButton.style.opacity = "";
      }, 1300);
    } catch (err) {
      showCopyModal(false, 'Lỗi sao chép: Trình duyệt không cho phép hoặc có lỗi kỹ thuật.');
    }
  }

  if (copyButton) {
    copyButton.addEventListener('click', copyKeyAction);
  }

  startVerification();
})();
</script>
</body>
</html>
